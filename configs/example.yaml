# Full P1 pipeline: download -> inspect -> collect_router_stats -> prune (router_top)
#                   -> cache_teacher -> train (hidden MSE + router KL + SFT CE)

project:
  name: my_moe_prune
  output_dir: ./outputs

download:
  model_id: llmfan46/Qwen3.6-35B-A3B-uncensored-heretic-Native-MTP-Preserved
  revision: main
  hf_endpoint: https://hf-mirror.com
  local_dir: ./models/teacher

prune:
  target_num_experts: 128
  target_num_experts_per_tok: 8
  keep_shared_experts: true
  expert_selection: router_top   # first_n | router_top | manual
  manual_experts: null
  router_stat_samples: 256
  router_stats_path: null         # defaults to <student_dir>/../router_stats.json
  student_dir: ./models/student_pruned

teacher_cache:
  enabled: true
  cache_dir: ./cache/teacher_hiddens
  cache_dtype: float16
  cache_layers: block_4         # block-end aligned: layers [3, 7, 11, ..., N-1]
                                # so each layerwise block = 3 linear + 1 full attention
  cache_layer_interval: 4
  cache_router_logits: false

data:
  train_file: ./data/train.jsonl
  max_seq_len: 1024
  max_samples: 372951
  val_split: 0.01         # deterministic id-hash split out of train_file (0 = no val set)

train:
  epochs: 1
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4
  warmup_ratio: 0.03
  weight_decay: 0.1
  max_grad_norm: 1.0
  gradient_checkpointing: true
  use_flash_attention: true
  seed: 42
  save_steps: 200
  eval_steps: 200          # 0 -> reuse save_steps
  output_dir: ./outputs/student_distilled

  lr_scheduler:
    type: cosine            # cosine | linear | constant
    min_lr_ratio: 0.1       # final lr = lr * min_lr_ratio at total_steps

  tensorboard:
    enabled: false                       # write scalars to log_dir; soft dep, no-op if tensorboard pkg missing
    log_dir: ./outputs/tb               # TB run dir (per-block subdir created automatically)

  quantization:
    load_in_4bit: true
    bnb_4bit_compute_dtype: bfloat16
    bnb_4bit_quant_type: nf4

  trainable:
    embedding: false   # vision tower also frozen automatically (treated as special embedding)
    lm_head: false
    attention: lora
    shared_expert: lora
    routed_expert: lora
    router: full

  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
      - in_proj_qkv
      - in_proj_z
      - in_proj_b
      - in_proj_a
      - out_proj

  losses:
    hidden_mse: 1.0
    router_kl: 0.0
    sft_ce: 0.3
    hidden_layer_weighting: linear_deeper_more
    router_kl_temperature: 2.0

  layerwise:
    enabled: true
    max_steps_per_block: 2000
    mse_threshold: 1.0e-3
    patience: 500
    learning_rate: 3.0e-5
    optimizer: muon_triton_batched       # adamw_8bit | paged_adamw_8bit | adamw_fp32 | sso | sphere | muon | muon_triton | muon_triton_batched
    output_dir: ./models/student_layerwise
    use_router_kl: false
    save_every_steps: 200
    batch_size: 1                       # samples per micro-step (padded within batch)
    gradient_accumulation_steps: 20      # micro-steps per optimizer step
    gradient_checkpointing: false        # checkpoint each in-block layer (use_reentrant=False); ~1-2 GB savings
    # SSO-only knobs (used when optimizer ∈ {sso, sphere, muon})
    sso_ns_steps: 5
    sso_radius_c: 1.0           # paper uses c≈2 for full pretraining; 1.0 is conservative for finetuning
    sso_radius_mode: preserve   # preserve = keep each weight's initial σ as its sphere (right for distill);
                                # paper = project onto R = c·√(d_out/d_in) at init (right for from-scratch)
    sso_msign_dtype: fp32       # paper §5.2; bf16 trades precision for speed
    sso_bisect_max_iters: 20
    sso_bisect_tol: 2.0e-4
    sso_power_iters: 4
    # MuonTriton knobs (used when optimizer ∈ {muon_triton, muon_triton_batched})
    muon_momentum: 0.95
    muon_ns_steps: 5
    muon_paged_momentum: true   # when true, 3D MoE expert momentum_buffer is held
                                # in host pinned RAM and staged to/from GPU each step.
                                # Saves ~3 GB on this config; +30-50% per-step time.
    # LR schedule (per-block reset)
    lr_scheduler_type: cosine    # cosine | linear | constant
    min_lr_ratio: 0.1
    warmup_ratio: 0.03           # fraction of max_steps_per_block used for warmup
    log_every_steps: 20
    eval_every_steps: 200          # 0 -> reuse log_every_steps
    use_student_rollout_input: true  # if true: block N+1 reads input from the prior block's
                                      # student-rollout cache (post-block N forward, eval-mode)
                                      # instead of teacher_cache[input_layer]. Target stays
                                      # teacher cache. Forces sequential block execution.
    lora:
      enabled: true                # off by default; turn on to load attention sub-modules
                                    # in 4bit + LoRA. Norms always frozen when enabled;
                                    # router / shared_expert / experts stay full-finetune.
      r: 16
      alpha: 32
      dropout: 0.05
      target_modules:               # full + linear attention Linears (NO MoE/router/embed)
        - q_proj
        - k_proj
        - v_proj
        - o_proj
        - in_proj_qkv
        - in_proj_z
        - in_proj_b
        - in_proj_a
        - out_proj
      load_in_4bit: true
      bnb_4bit_compute_dtype: bfloat16
      bnb_4bit_quant_type: nf4

# Step 5 (optional): export trained model to quantized GGUF for llama.cpp / ollama / LM Studio.
# - Strips vision encoder + (default) MTP layers since llama.cpp PR #19435 supports text-only.
# - Requires external llama.cpp checkout: source for convert_hf_to_gguf.py and a built
#   llama-quantize(.exe). Recommend prebuilt CPU release from
#   https://github.com/ggml-org/llama.cpp/releases  +  shallow clone for the convert script.
# - All work is CPU; no VRAM. Disk: ~70GB BF16 GGUF + each quant; preflight checks free space.
export_gguf:
  input_dir: ./models/student_layerwise   # any safetensor dir: teacher / student_pruned / student_layerwise
  output_dir: ./outputs/gguf
  llama_cpp_dir: ./third_party/llama.cpp        # contains llama-quantize(.exe)
  llama_cpp_src_dir: ./third_party/llama.cpp    # contains convert_hf_to_gguf.py (can be same dir)
  quant_types: [Q4_K_M]     # see scripts/export_gguf.py --help for full list
  drop_mtp: true                                 # true avoids llama.cpp issue #23033 (blk.40.ssm_conv1d)
  keep_bf16: false                               # delete intermediate BF16 GGUF after all quants succeed
  work_dir: ./outputs/gguf/_work_text_only       # vision-stripped HF dir reused across runs
  smoke_test: false                               # gguf-py header read + metadata sanity
  export_mmproj: false                            # also emit mmproj-<TYPE>.gguf for llama-mtmd-cli
  mmproj_outtype: bf16                           # bf16 | f16 | f32 (vision tower is not quantized)
